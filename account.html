<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Prayer Dome | User Registration & Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent-green: #22c55e;
            --accent-gold: #d4af37;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --accent-purple: #8b5cf6;
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --border-color: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s;
            min-height: 100vh;
        }

        body.dark-mode {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --border-color: #334155;
        }

        /* Header */
        .auth-header {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
            border-bottom: 1px solid var(--border-color);
            padding: 20px 30px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-gold));
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }

        .logo-text h1 {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-gold));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .theme-toggle, .back-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none;
            color: var(--text-primary);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* Main Container */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Auth Tabs */
        .auth-tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .auth-tab {
            padding: 12px 32px;
            border: none;
            background: transparent;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 60px;
            transition: all 0.3s;
            color: var(--text-secondary);
        }

        .auth-tab.active {
            background: linear-gradient(135deg, var(--accent-green), #16a34a);
            color: white;
            box-shadow: 0 4px 15px rgba(34,197,94,0.3);
        }

        /* Auth Cards */
        .auth-card {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 40px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
            max-width: 550px;
            margin: 0 auto;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-card h2 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--accent-green);
        }

        /* Form Styles */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group label .required {
            color: var(--accent-red);
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
            transition: all 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--accent-green);
        }

        .full-width {
            grid-column: span 2;
        }

        /* Profile Photo Upload */
        .profile-photo-container {
            text-align: center;
            margin-bottom: 25px;
        }

        .profile-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--accent-green);
            cursor: pointer;
            transition: all 0.3s;
        }

        .profile-photo:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(34,197,94,0.3);
        }

        .photo-upload-btn {
            margin-top: 10px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        /* Checkbox Group */
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 8px;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: normal;
            font-size: 0.85rem;
        }

        /* Buttons */
        .btn {
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-green), #16a34a);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(34,197,94,0.4);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--accent-green);
            color: var(--accent-green);
        }

        /* Profile Card */
        .profile-card {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 40px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
        }

        .stat-box {
            background: var(--bg-primary);
            padding: 15px;
            border-radius: 20px;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1100;
        }
        .toast {
            background: var(--bg-card);
            padding: 12px 24px;
            border-radius: 40px;
            margin-bottom: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border-left: 4px solid var(--accent-green);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 32px;
            max-width: 450px;
            width: 90%;
        }

        @media (max-width: 650px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .auth-card { padding: 25px; }
        }
    </style>
</head>
<body>
    <div class="auth-header">
        <div class="header-content">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-user-plus"></i></div>
                <div class="logo-text">
                    <h1>Prayer Dome Account</h1>
                    <p>Join our prayer community</p>
                </div>
            </div>
            <div class="header-actions">
                <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
                <button class="theme-toggle" onclick="toggleDarkMode()"><i class="fas fa-moon"></i> Dark Mode</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <!-- Auth Tabs -->
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="showAuthForm('login')">Sign In</button>
            <button class="auth-tab" onclick="showAuthForm('register')">Create Account</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="auth-card">
            <h2><i class="fas fa-sign-in-alt"></i> Welcome Back</h2>
            <form onsubmit="event.preventDefault(); loginUser()">
                <div class="form-group">
                    <label>Email or Phone Number *</label>
                    <input type="text" id="loginIdentifier" placeholder="email@example.com or +1234567890" required>
                </div>
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>
                <div style="text-align: right; margin-bottom: 20px;">
                    <a href="#" onclick="forgotPassword()" style="color: var(--accent-green); font-size: 0.85rem;">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary">Sign In <i class="fas fa-arrow-right"></i></button>
                <div style="text-align: center; margin: 20px 0;">
                    <span style="color: var(--text-secondary);">or</span>
                </div>
                <button type="button" class="btn btn-outline" style="width: 100%;" onclick="signInWithGoogle()">
                    <i class="fab fa-google"></i> Continue with Google
                </button>
            </form>
        </div>

        <!-- Registration Form -->
        <div id="registerForm" class="auth-card" style="display: none; max-width: 700px;">
            <h2><i class="fas fa-user-plus"></i> Create Account</h2>
            <form onsubmit="event.preventDefault(); registerUser()">
                <!-- Profile Photo -->
                <div class="profile-photo-container">
                    <img id="profilePhotoPreview" class="profile-photo" src="https://i.ibb.co/TB5Fx4tb/logo-0.png" onclick="openCloudinaryUpload()">
                    <div class="photo-upload-btn" onclick="openCloudinaryUpload()"><i class="fas fa-camera"></i> Upload Photo</div>
                    <input type="hidden" id="profilePhotoUrl" value="">
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" id="regFullName" placeholder="First & Last Name" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address *</label>
                        <input type="email" id="regEmail" placeholder="your@email.com" required>
                        <small style="color: var(--text-secondary);">Must be a valid email (e.g., @gmail.com, @outlook.com, etc.)</small>
                    </div>
                    <div class="form-group">
                        <label>Phone Number *</label>
                        <div style="display: flex; gap: 10px;">
                            <select id="regCountryCode" style="width: 100px;"></select>
                            <input type="tel" id="regPhone" placeholder="Phone number" style="flex: 1;" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Country *</label>
                        <select id="regCountry" required></select>
                    </div>
                    <div class="form-group">
                        <label>Date of Birth *</label>
                        <input type="date" id="regDob" required>
                    </div>
                    <div class="form-group">
                        <label>Gender *</label>
                        <select id="regGender" required>
                            <option value="">Select</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label>Address</label>
                        <input type="text" id="regAddress" placeholder="Your address (optional)">
                    </div>
                    <div class="form-group">
    <label>Password *</label>
    <input type="password" id="memberPassword" placeholder="Create a password" required>
    <small style="font-size: 11px;">Minimum 6 characters</small>
</div>
<div class="form-group">
    <label>Confirm Password *</label>
    <input type="password" id="memberConfirmPassword" placeholder="Confirm password" required>
</div>
                    <div class="form-group full-width">
                        <label>Security Question *</label>
                        <select id="securityQuestion" required>
                            <option value="">Select a security question</option>
                            <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
                            <option value="What was your first pet's name?">What was your first pet's name?</option>
                            <option value="What was the name of your first school?">What was the name of your first school?</option>
                            <option value="What is your favorite Bible verse?">What is your favorite Bible verse?</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label>Security Answer *</label>
                        <input type="text" id="securityAnswer" placeholder="Your answer" required>
                    </div>
                    <div class="form-group full-width">
                        <label>How did you hear about us?</label>
                        <select id="regReferral">
                            <option value="">Select</option>
                            <option value="Facebook">Facebook</option>
                            <option value="WhatsApp">WhatsApp</option>
                            <option value="Friend/Family">Friend or Family</option>
                            <option value="Church">Church</option>
                            <option value="Google">Google Search</option>
                            <option value="Instagram">Instagram</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label>I'm interested in:</label>
                        <div class="checkbox-group">
                            <label><input type="checkbox" value="Prayer"> Prayer Requests</label>
                            <label><input type="checkbox" value="Membership"> Membership</label>
                            <label><input type="checkbox" value="Donations"> Giving</label>
                            <label><input type="checkbox" value="Volunteer"> Volunteer</label>
                            <label><input type="checkbox" value="Events"> Events</label>
                            <label><input type="checkbox" value="Bible Study"> Bible Study</label>
                        </div>
                    </div>
                </div>

                <div style="margin: 20px 0; padding: 15px; background: var(--bg-primary); border-radius: 16px;">
                    <label style="display: flex; gap: 10px;">
                        <input type="checkbox" id="regTerms" required>
                        <span>I agree to the <a href="#" style="color: var(--accent-green);">Terms of Service</a> and <a href="#" style="color: var(--accent-green);">Privacy Policy</a></span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary">Create Account <i class="fas fa-user-plus"></i></button>
            </form>
        </div>

        <!-- Profile Section (shown after login) -->
        <div id="profileSection" class="auth-card" style="display: none;">
            <div class="profile-photo-container">
                <img id="profilePhoto" class="profile-photo" src="https://i.ibb.co/TB5Fx4tb/logo-0.png" onclick="openEditPhotoModal()">
                <div class="photo-upload-btn" onclick="openEditPhotoModal()"><i class="fas fa-camera"></i> Change Photo</div>
            </div>
            <h2 id="profileName">User Name</h2>
            <p id="profileEmail" style="color: var(--text-secondary);"></p>
            <p id="profileMemberId" style="color: var(--accent-gold); font-size: 0.85rem; margin-top: 5px;"></p>
            
            <div class="profile-stats">
                <div class="stat-box">
                    <div class="stat-number" id="profilePrayers">0</div>
                    <div class="stat-label">Prayers</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="profileJoined">0</div>
                    <div class="stat-label">Days Active</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="profileQuizScore">0</div>
                    <div class="stat-label">Quiz Score</div>
                </div>
            </div>

            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button class="btn btn-primary" style="flex: 1;" onclick="showEditProfile()"><i class="fas fa-edit"></i> Edit Profile</button>
                <button class="btn btn-outline" style="flex: 1;" onclick="logoutUser()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, query, where, Timestamp, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile, sendEmailVerification, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxvql0r_aeerphxTA0UUedRppdBxGf7wo",
            authDomain: "prayer-dome.firebaseapp.com",
            projectId: "prayer-dome",
            storageBucket: "prayer-dome.firebasestorage.app",
            messagingSenderId: "198295153196",
            appId: "1:198295153196:web:1222b31948d7974ba3bf89"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let cloudinaryWidget = null;
        let uploadedPhotoUrl = null;

        // Countries Data
        const countries = [
            { code: "+1", name: "United States", flag: "🇺🇸", countryCode: "US" },
            { code: "+44", name: "United Kingdom", flag: "🇬🇧", countryCode: "GB" },
            { code: "+27", name: "South Africa", flag: "🇿🇦", countryCode: "ZA" },
            { code: "+260", name: "Zambia", flag: "🇿🇲", countryCode: "ZM" },
            { code: "+268", name: "Eswatini", flag: "🇸🇿", countryCode: "SZ" },
            { code: "+263", name: "Zimbabwe", flag: "🇿🇼", countryCode: "ZW" },
            { code: "+267", name: "Botswana", flag: "🇧🇼", countryCode: "BW" },
            { code: "+264", name: "Namibia", flag: "🇳🇦", countryCode: "NA" },
            { code: "+265", name: "Malawi", flag: "🇲🇼", countryCode: "MW" },
            { code: "+255", name: "Tanzania", flag: "🇹🇿", countryCode: "TZ" },
            { code: "+254", name: "Kenya", flag: "🇰🇪", countryCode: "KE" },
            { code: "+256", name: "Uganda", flag: "🇺🇬", countryCode: "UG" },
            { code: "+250", name: "Rwanda", flag: "🇷🇼", countryCode: "RW" },
            { code: "+61", name: "Australia", flag: "🇦🇺", countryCode: "AU" },
            { code: "+49", name: "Germany", flag: "🇩🇪", countryCode: "DE" },
            { code: "+33", name: "France", flag: "🇫🇷", countryCode: "FR" },
            { code: "+91", name: "India", flag: "🇮🇳", countryCode: "IN" },
            { code: "+86", name: "China", flag: "🇨🇳", countryCode: "CN" },
            { code: "+81", name: "Japan", flag: "🇯🇵", countryCode: "JP" },
            { code: "+55", name: "Brazil", flag: "🇧🇷", countryCode: "BR" }
        ];

        function populateCountryDropdowns() {
            const codeSelect = document.getElementById('regCountryCode');
            const countrySelect = document.getElementById('regCountry');
            
            countries.sort((a, b) => a.name.localeCompare(b.name));
            
            countries.forEach(c => {
                codeSelect.innerHTML += `<option value="${c.code}">${c.flag} ${c.code}</option>`;
                countrySelect.innerHTML += `<option value="${c.countryCode}">${c.flag} ${c.name}</option>`;
            });
        }

        function isValidEmail(email) {
            const re = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
            return re.test(email);
        }

        function validateEmailDomain(email) {
            const validDomains = ['gmail.com', 'outlook.com', 'yahoo.com', 'hotmail.com', 'icloud.com', 'protonmail.com', 'aol.com'];
            const domain = email.split('@')[1];
            if (!domain) return false;
            return true;
        }

        function initCloudinaryWidget(callback) {
            if (cloudinaryWidget) return cloudinaryWidget;
            
            cloudinaryWidget = cloudinary.createUploadWidget({
                cloudName: 'prayerdome',
                uploadPreset: 'profile_photos',
                folder: 'user_profiles',
                cropping: true,
                multiple: false,
                maxFileSize: 5 * 1024 * 1024,
                resourceType: 'image',
                clientAllowedFormats: ['jpg', 'jpeg', 'png', 'webp']
            }, (error, result) => {
                if (error) {
                    showToast('Upload failed: ' + error.message, 'error');
                    return;
                }
                if (result && result.event === 'success') {
                    uploadedPhotoUrl = result.info.secure_url;
                    if (callback) callback(uploadedPhotoUrl);
                }
            });
            return cloudinaryWidget;
        }

        function openCloudinaryUpload() {
            const widget = initCloudinaryWidget((url) => {
                document.getElementById('profilePhotoPreview').src = url;
                document.getElementById('profilePhotoUrl').value = url;
            });
            widget.open();
        }

        async function registerUser() {
    const fullName = document.getElementById('regFullName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const countryCode = document.getElementById('regCountryCode').value;
    const phone = document.getElementById('regPhone').value.trim();
    const country = document.getElementById('regCountry').value;
    const dob = document.getElementById('regDob').value;
    const gender = document.getElementById('regGender').value;
    const address = document.getElementById('regAddress').value;
    const password = document.getElementById('regPassword').value;
    const confirmPassword = document.getElementById('regConfirmPassword').value;
    const securityQuestion = document.getElementById('securityQuestion').value;
    const securityAnswer = document.getElementById('securityAnswer').value;
    const terms = document.getElementById('regTerms').checked;
    const photoUrl = document.getElementById('profilePhotoUrl').value;

    if (!fullName || !email || !phone || !country || !dob || !gender || !password || !securityQuestion || !securityAnswer) {
        showToast('Please fill all required fields', 'error');
        return;
    }

    if (!isValidEmail(email)) {
        showToast('Please enter a valid email address', 'error');
        return;
    }

    if (password.length < 6) {
        showToast('Password must be at least 6 characters', 'error');
        return;
    }

    if (password !== confirmPassword) {
        showToast('Passwords do not match', 'error');
        return;
    }

    if (!terms) {
        showToast('Please accept the Terms of Service', 'error');
        return;
    }

    const fullPhone = `${countryCode}${phone}`;

    try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        await updateProfile(user, {
            displayName: fullName,
            photoURL: photoUrl || 'https://i.ibb.co/TB5Fx4tb/logo-0.png'
        });

        await sendEmailVerification(user);

        const interests = [];
        document.querySelectorAll('#registerForm input[type="checkbox"][value]').forEach(cb => {
            if (cb.checked) interests.push(cb.value);
        });

        // GENERATE MEMBERSHIP ID
        const membersSnapshot = await getDocs(collection(db, "memberships"));
        const memberCount = membersSnapshot.size + 1;
        const membershipId = `PD${new Date().getFullYear()}${String(memberCount).padStart(4, '0')}`;

        // SAVE TO MEMBERSHIPS COLLECTION (NOT users)
        await setDoc(doc(db, "memberships", user.uid), {
            userId: user.uid,
            membershipId: membershipId,
            fullName: fullName,
            email: email,
            phone: fullPhone,
            country: country,
            dateOfBirth: dob,
            gender: gender,
            address: address,
            photoURL: photoUrl || 'https://i.ibb.co/TB5Fx4tb/logo-0.png',
            securityQuestion: securityQuestion,
            securityAnswer: securityAnswer,
            referralSource: document.getElementById('regReferral').value,
            interests: interests,
            role: 'member',
            emailVerified: false,
            walletBalance: 0,
            createdAt: serverTimestamp(),
            lastLogin: serverTimestamp()
        });

        // CREATE WALLET RECORD
        await setDoc(doc(db, "wallets", user.uid), {
            userId: user.uid,
            balance: 0,
            currency: "SZL",
            deposits: [],
            withdrawals: [],
            pendingDeposits: [],
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
        });

        // CREATE QUIZ RECORD
        await setDoc(doc(db, "userQuiz", user.uid), {
            userId: user.uid,
            completedLevels: [],
            currentLevel: 1,
            totalScore: 0,
            lastPlayed: serverTimestamp()
        });

        showToast(`✅ Welcome ${fullName}! Your Member ID: ${membershipId}`, 'success');
        confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
        
        // STORE SESSION
        localStorage.setItem('prayerDomeUser', JSON.stringify({
            uid: user.uid,
            email: email,
            name: fullName,
            membershipId: membershipId
        }));
        
        // REDIRECT TO DASHBOARD
        setTimeout(() => {
            window.location.href = 'user.html';
        }, 2000);
        
    } catch (error) {
        console.error('Registration error:', error);
        if (error.code === 'auth/email-already-in-use') {
            showToast('Email already registered. Please login instead.', 'error');
        } else {
            showToast(error.message, 'error');
        }
    }
}

        async function loginUser() {
    const identifier = document.getElementById('loginIdentifier').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!identifier || !password) {
        showToast('Please enter email/phone and password', 'error');
        return;
    }

    let email = identifier;
    
    // If it's a phone number, find the associated email
    if (!email.includes('@')) {
        try {
            const membersSnapshot = await getDocs(collection(db, "memberships"));
            let found = false;
            for (const docSnap of membersSnapshot.docs) {
                if (docSnap.data().phone === identifier) {
                    email = docSnap.data().email;
                    found = true;
                    break;
                }
            }
            if (!found) {
                showToast('User not found with this phone number', 'error');
                return;
            }
        } catch (error) {
            showToast('Error finding user', 'error');
            return;
        }
    }

    try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        // Update last login in memberships
        await updateDoc(doc(db, "memberships", user.uid), {
            lastLogin: serverTimestamp()
        });
        
        // Store session
        const memberDoc = await getDoc(doc(db, "memberships", user.uid));
        const memberData = memberDoc.data();
        
        localStorage.setItem('prayerDomeUser', JSON.stringify({
            uid: user.uid,
            email: user.email,
            name: memberData?.fullName || user.displayName,
            membershipId: memberData?.membershipId
        }));
        
        showToast('Login successful!', 'success');
        window.location.href = 'user.html';
        
    } catch (error) {
        console.error('Login error:', error);
        if (error.code === 'auth/user-not-found') {
            showToast('No account found with this email', 'error');
        } else if (error.code === 'auth/wrong-password') {
            showToast('Incorrect password', 'error');
        } else {
            showToast('Invalid email/phone or password', 'error');
        }
    }
}

        async function signInWithGoogle() {
    const provider = new GoogleAuthProvider();
    try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        
        // Check if membership exists
        const memberRef = doc(db, "memberships", user.uid);
        const memberSnap = await getDoc(memberRef);
        
        if (!memberSnap.exists()) {
            // Create full membership record
            const membersSnapshot = await getDocs(collection(db, "memberships"));
            const memberCount = membersSnapshot.size + 1;
            const membershipId = `PD${new Date().getFullYear()}${String(memberCount).padStart(4, '0')}`;
            
            await setDoc(memberRef, {
                userId: user.uid,
                membershipId: membershipId,
                fullName: user.displayName || 'Google User',
                email: user.email,
                photoURL: user.photoURL || 'https://i.ibb.co/TB5Fx4tb/logo-0.png',
                role: 'member',
                emailVerified: user.emailVerified,
                createdAt: serverTimestamp(),
                lastLogin: serverTimestamp()
            });
            
            // Create wallet
            await setDoc(doc(db, "wallets", user.uid), {
                userId: user.uid,
                balance: 0,
                currency: "SZL",
                deposits: [],
                withdrawals: [],
                pendingDeposits: [],
                createdAt: serverTimestamp()
            });
            
            // Create quiz record
            await setDoc(doc(db, "userQuiz", user.uid), {
                userId: user.uid,
                completedLevels: [],
                currentLevel: 1,
                totalScore: 0,
                lastPlayed: serverTimestamp()
            });
        } else {
            await updateDoc(memberRef, { lastLogin: serverTimestamp() });
        }
        
        // Store session
        const memberData = (await getDoc(memberRef)).data();
        localStorage.setItem('prayerDomeUser', JSON.stringify({
            uid: user.uid,
            email: user.email,
            name: memberData?.fullName || user.displayName,
            membershipId: memberData?.membershipId,
            photoURL: memberData?.photoURL || user.photoURL
        }));
        
        showToast('Login successful!', 'success');
        window.location.href = 'user.html';
        
    } catch (error) {
        showToast(error.message, 'error');
    }
}

        async function loadUserProfile() {
    if (!currentUser) return;
    
    // Get from memberships collection
    const memberRef = doc(db, "memberships", currentUser.uid);
    const memberSnap = await getDoc(memberRef);
    const memberData = memberSnap.data() || {};
    
    document.getElementById('profilePhoto').src = currentUser.photoURL || memberData.photoURL || 'https://i.ibb.co/TB5Fx4tb/logo-0.png';
    document.getElementById('profileName').textContent = currentUser.displayName || memberData.fullName;
    document.getElementById('profileEmail').textContent = currentUser.email;
    
    const joinedDate = memberData.createdAt?.toDate() || new Date();
    const daysActive = Math.floor((new Date() - joinedDate) / (1000 * 60 * 60 * 24));
    document.getElementById('profileJoined').textContent = daysActive;
    
    // Count user's prayers
    const prayersQuery = query(collection(db, "prayers"), where("userId", "==", currentUser.uid));
    const prayersSnap = await getDocs(prayersQuery);
    document.getElementById('profilePrayers').textContent = prayersSnap.size;
    
    // Get quiz score
    const quizDoc = await getDoc(doc(db, "userQuiz", currentUser.uid));
    document.getElementById('profileQuizScore').textContent = quizDoc.exists() ? quizDoc.data().totalScore : 0;
    
    // Get wallet balance
    const walletDoc = await getDoc(doc(db, "wallets", currentUser.uid));
    const walletBalance = walletDoc.exists() ? walletDoc.data().balance : 0;
    
    // Add wallet display to profile
    const profileStats = document.querySelector('.profile-stats');
    if (profileStats && !document.getElementById('profileWallet')) {
        const walletBox = document.createElement('div');
        walletBox.className = 'stat-box';
        walletBox.innerHTML = `
            <div class="stat-number" id="profileWallet">E${walletBalance.toFixed(2)}</div>
            <div class="stat-label">Wallet Balance</div>
        `;
        profileStats.appendChild(walletBox);
    } else if (document.getElementById('profileWallet')) {
        document.getElementById('profileWallet').textContent = `E${walletBalance.toFixed(2)}`;
    }
    
    document.getElementById('profileMemberId').textContent = `Member ID: ${memberData.membershipId || 'Pending'}`;
    
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('profileSection').style.display = 'block';
}
        
        function logoutUser() {
            signOut(auth);
            document.getElementById('profileSection').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            showToast('Logged out', 'success');
        }

        function showAuthForm(type) {
            document.querySelectorAll('.auth-tab').forEach(tab => tab.classList.remove('active'));
            if (type === 'login') {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
                document.getElementById('profileSection').style.display = 'none';
                event.target.classList.add('active');
            } else {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
                document.getElementById('profileSection').style.display = 'none';
                event.target.classList.add('active');
            }
        }

        function showToast(msg, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        function forgotPassword() {
            showToast('Password reset link sent to your email', 'info');
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const btn = document.querySelector('.theme-toggle');
            btn.innerHTML = document.body.classList.contains('dark-mode') ? '<i class="fas fa-sun"></i> Light Mode' : '<i class="fas fa-moon"></i> Dark Mode';
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                loadUserProfile();
            } else {
                document.getElementById('profileSection').style.display = 'none';
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            }
        });

        populateCountryDropdowns();
        window.openCloudinaryUpload = openCloudinaryUpload;
        window.registerUser = registerUser;
        window.loginUser = loginUser;
        window.signInWithGoogle = signInWithGoogle;
        window.logoutUser = logoutUser;
        window.showAuthForm = showAuthForm;
        window.forgotPassword = forgotPassword;
        window.toggleDarkMode = toggleDarkMode;
    </script>
</body>
